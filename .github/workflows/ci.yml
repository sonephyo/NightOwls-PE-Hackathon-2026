name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync --group dev

      - name: Run tests
        run: uv run pytest tests/ -v

  docker:
    runs-on: ubuntu-latest
    needs: [test]

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t nightowls-app .

      - name: Start app + db
        run: docker compose up -d app db

      - name: Wait for app to be healthy
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8000/health; then
              echo "App is up"
              exit 0
            fi
            echo "Waiting... ($i/30)"
            sleep 3
          done
          echo "App never became healthy"
          docker compose logs app
          exit 1

      - name: Smoke test /health
        run: curl -sf http://localhost:8000/health | grep '"status"'

      - name: Smoke test /metrics
        run: curl -sf http://localhost:8000/metrics | grep 'app_cpu_usage_percent'

      - name: Tear down
        if: always()
        run: docker compose down -v
