name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync --group dev

      - name: Run tests with coverage
        run: uv run pytest tests/ -v --cov=app --cov-report=term-missing --cov-report=html --cov-fail-under=95

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: htmlcov/
          retention-days: 14

  docker:
    runs-on: ubuntu-latest
    needs: [test]

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t nightowls-app .

      - name: Write CI compose override (expose app port, skip nginx in CI)
        run: |
          cat > docker-compose.ci.yml << 'EOF'
          services:
            app:
              ports:
                - "8000:8000"
          EOF

      - name: Start app + db + redis (no nginx — check app directly on port 8000)
        run: docker compose -f docker-compose.yml -f docker-compose.ci.yml up -d --scale app=1 app db redis

      - name: Wait for app to be healthy
        run: |
          for i in $(seq 1 40); do
            if curl -sf http://localhost:8000/health; then
              echo "App is up"
              exit 0
            fi
            echo "Waiting... ($i/40)"
            sleep 3
          done
          echo "App never became healthy"
          docker compose logs app
          exit 1

      - name: Smoke test /health
        run: curl -sf http://localhost:8000/health | grep '"status"'

      - name: Smoke test /metrics
        run: curl -sf http://localhost:8000/metrics | grep 'app_cpu_usage_percent'

      - name: Tear down
        if: always()
        run: docker compose -f docker-compose.yml -f docker-compose.ci.yml down -v

  deploy:
    runs-on: ubuntu-latest
    needs: [test, docker]
    # Only deploy on pushes to main — not on PRs
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Deploy to DigitalOcean droplet
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -e
            cd /var/www/PE-Hackathon-Template-2026

            # Write .env with secrets — never stored in git
            cat > .env <<'ENVEOF'
            DISCORD_WEBHOOK_URL=${{ secrets.DISCORD_WEBHOOK_URL }}
            PAGERDUTY_ROUTING_KEY=${{ secrets.PAGERDUTY_ROUTING_KEY }}
            DATABASE_NAME=hackathon_db
            DATABASE_HOST=db
            DATABASE_PORT=5432
            DATABASE_USER=postgres
            DATABASE_PASSWORD=postgres
            ENVEOF

            git checkout -- .
            git pull origin main

            docker compose pull --quiet || true
            docker compose up -d --build --remove-orphans

            # Verify the app came back up (nginx is on port 80 in prod)
            for i in $(seq 1 15); do
              if curl -sf http://localhost/health; then
                echo "Deploy successful"
                exit 0
              fi
              sleep 3
            done
            docker compose logs app
            exit 1
