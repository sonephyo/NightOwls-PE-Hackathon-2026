worker_processes auto;

events {
    worker_connections 4096;
    multi_accept on;
    use epoll;
}

http {
    # Rate limiting — 30 req/s per IP, burst of 50 before returning 429
    # Disabled for load testing — uncomment to re-enable in production
    # limit_req_zone $binary_remote_addr zone=per_ip:10m rate=30r/s;
    # limit_req_status 429;

    # Docker's internal DNS — re-resolves app:8000 every 5s so all 3 replicas get traffic
    resolver 127.0.0.11 valid=5s ipv6=off;

    upstream app_servers {
        least_conn;
        server app:8000 max_fails=3 fail_timeout=30s;
        keepalive 64;
    }

    server {
        listen 80 backlog=4096;
        server_name night-owls.duckdns.org;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl backlog=4096;
        server_name night-owls.duckdns.org;
        client_max_body_size 16M;
        keepalive_timeout 30;

        ssl_certificate     /etc/letsencrypt/live/night-owls.duckdns.org/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/night-owls.duckdns.org/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        location / {
            # Rate limit — uncomment to re-enable in production
            # limit_req zone=per_ip burst=50 nodelay;

            proxy_pass         http://app_servers;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";

            proxy_connect_timeout 30s;
            proxy_send_timeout    30s;
            proxy_read_timeout    30s;

            proxy_buffering    on;
            proxy_buffer_size  4k;
            proxy_buffers      8 4k;
        }

        location /nginx-health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }
    }
}
