worker_processes auto;

events {
    worker_connections 4096;
    multi_accept on;
    use epoll;
}

http {
    # Rate limiting — 30 req/s per IP, burst of 50 before returning 429
    limit_req_zone $binary_remote_addr zone=per_ip:10m rate=30r/s;
    limit_req_status 429;

    # Gzip — cuts JSON response size ~70%, reduces bandwidth under load
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 4;
    gzip_min_length 256;
    gzip_types application/json text/plain application/javascript text/css;

    upstream app_servers {
        least_conn;
        server app:8000 max_fails=3 fail_timeout=30s;
        keepalive 64;
        keepalive_requests 1000;
        keepalive_timeout 60s;
    }

    # -------------------------------------------------------
    # 1. HTTP SERVER (port 80) — ACME challenge + redirect
    # -------------------------------------------------------
    server {
        listen 80 backlog=4096;
        server_name night-owls.duckdns.org;

        client_max_body_size 16M;

        # Certbot ACME challenge (Let's Encrypt renewal)
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Redirect all other HTTP traffic to HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # -------------------------------------------------------
    # 2. HTTPS SERVER (port 443)
    # -------------------------------------------------------
    server {
        listen 443 ssl;
        server_name night-owls.duckdns.org;

        ssl_certificate     /etc/letsencrypt/live/night-owls.duckdns.org/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/night-owls.duckdns.org/privkey.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;

        client_max_body_size 16M;
        keepalive_timeout 65;

        # ── Main app ────────────────────────────────────────
        location / {
            limit_req zone=per_ip burst=50 nodelay;

            proxy_pass         http://app_servers;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";

            proxy_connect_timeout 30s;
            proxy_send_timeout    30s;
            proxy_read_timeout    30s;

            proxy_buffering    on;
            proxy_buffer_size  4k;
            proxy_buffers      8 4k;
        }

        # ── Grafana — https://night-owls.duckdns.org/grafana/
        location /grafana/ {
            proxy_pass         http://grafana:3000/;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            # WebSocket support for Grafana live dashboards
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
        }

        # ── Prometheus — https://night-owls.duckdns.org/prometheus/
        location /prometheus/ {
            proxy_pass         http://prometheus:9090/;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # ── Alertmanager — https://night-owls.duckdns.org/alertmanager/
        location /alertmanager/ {
            proxy_pass         http://alertmanager:9093/;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        location /nginx-health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }
    }
}
