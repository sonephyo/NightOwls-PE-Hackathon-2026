groups:
  - name: flask_app_alerts
    rules:
      - alert: FlaskAppDown
        expr: up{job="flask-app"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Flask app is unreachable"
          description: "Prometheus cannot scrape {{ $labels.instance }} — container may be stopped or crashed."

      - alert: HighErrorRate
        expr: >
          (
            sum(rate(http_requests_total{http_status=~"5.."}[2m]))
            /
            sum(rate(http_requests_total[2m]))
          ) > 0.10
          and
          sum(rate(http_requests_total[2m])) > 0.0833
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "High HTTP 5xx error rate"
          description: "More than 10% of requests are returning 5xx errors ({{ $value | humanizePercentage }})."
